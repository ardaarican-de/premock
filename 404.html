<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>premock</title>
<script>
  // GitHub Pages has no server-side routing, so a clean share link like /1a returns this
  // 404 page. Bounce it to /?/1a — index.html restores the clean path with replaceState.
  (function(){
    var l = location;
    l.replace(l.protocol + '//' + l.host + '/?/' + l.pathname.slice(1) + l.hash);
  })();
</script>
</head>
<body></body>
</html>
